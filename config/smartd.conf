# smartd.conf — worlock
# Generated 2026-03-27. Rewritten 2026-05-31: every device pinned by /dev/disk/by-id/
# (stable serial-based names) instead of /dev/sdX. SATA letters drift on this host after
# the RTX 5080/3080 PCIe renumbering, and the raw sdX entries had begun monitoring the
# WRONG disks (e.g. the WD Black pdf_backup drive was being judged by an IronWolf-tuned
# threshold block). Backup of the prior file: /etc/smartd.conf.bak-2026-05-31
# See man smartd.conf for directives.

# === Backup drive (pdf_backup) ===
# WDC WD4005FZBX 4TB, serial VBGZSTNF (was /dev/sda; now /dev/sdg — pinned by-id)
# monitor all, short test daily 2am, long test Sat 3am
/dev/disk/by-id/ata-WDC_WD4005FZBX-00K5WB0_VBGZSTNF -d sat -a -o on -S on \
         -s (S/../.././02|L/../../6/03) \
         -W 4,45,55 \
         -n standby,q

# === RAID0 members (md0 — monolithic_pdf_folder) ===
# Seagate IronWolf 12TB, serial ZL2PLEG9 (was /dev/sdc; now /dev/sdf — pinned by-id)
/dev/disk/by-id/ata-ST12000VN0008-2PH103_ZL2PLEG9 -d sat -a -o on -S on \
         -s (S/../.././02|L/../../6/03) \
         -W 4,44,50 \
         -n standby,q

# Seagate IronWolf 12TB, serial ZLW2HXSN (was /dev/sdg; now /dev/sdd — pinned by-id)
# WARNING: attr 190 (Airflow_Temp) hit threshold in the past (max 47C, thresh 40).
# Temperature alert set to 48C info / 54C critical.
/dev/disk/by-id/ata-ST12000VN0008-2PH103_ZLW2HXSN -d sat -a -o on -S on \
         -s (S/../.././02|L/../../6/03) \
         -W 3,48,54 \
         -n standby,q

# === Other drives (generic SMART monitoring; -n standby,q = don't spin up if asleep) ===
# Expanded from 3 raw sdX entries to all 4 current non-RAID/non-backup drives (one SATA
# HDD was added since 2026-03-27). All pinned by-id.
# Samsung SSD 870 EVO 500GB (now /dev/sda)
/dev/disk/by-id/ata-Samsung_SSD_870_EVO_500GB_S6PXNS0YC00884H -d sat -a -n standby,q
# WDC WDS100T2B0A — WD Blue SSD 1TB (now /dev/sdb)
/dev/disk/by-id/ata-WDC_WDS100T2B0A-00SM50_21313F803818 -d sat -a -n standby,q
# WDC WD10EURX 1TB (now /dev/sdc)
/dev/disk/by-id/ata-WDC_WD10EURX-63UY4Y0_WD-WCC4J2CHPRRU -d sat -a -n standby,q
# Hitachi HUA723020ALA640 2TB (now /dev/sde)
/dev/disk/by-id/ata-Hitachi_HUA723020ALA640_MK0171YFJHSSDA -d sat -a -n standby,q

# === NVMe (pinned by-id; by-id exposes the namespace, smartd reads the controller) ===
# INTEL SSDPEKNW010T8 1TB (nvme0n1)
/dev/disk/by-id/nvme-INTEL_SSDPEKNW010T8_PHNH930605FY1P0B -d nvme -a -n standby,q
# WDS500G2X0C — WD Black SN750 500GB (nvme1n1)
/dev/disk/by-id/nvme-WDS500G2X0C-00L350_184043802337 -d nvme -a -n standby,q
